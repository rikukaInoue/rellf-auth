{{define "title"}}Create User{{end}}
{{define "content"}}
<div class="page-header">
  <h1>Create User</h1>
  <a href="/admin/users" class="btn btn-outline">Back to list</a>
</div>

<div class="card">
  <form method="POST" action="/admin/users/new">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="temp_password">Temporary Password</label>
      <input type="password" id="temp_password" name="temp_password" required minlength="8">
    </div>
    <button type="submit" class="btn btn-primary">Create User</button>
  </form>
</div>
{{end}}
