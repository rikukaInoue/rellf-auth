{{define "layout"}}<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{template "title" .}} - rellf-auth Admin</title>
  <link rel="stylesheet" href="/admin/static/style.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="/admin/users" class="brand">rellf-auth Admin</a>
      <div class="nav-right">
        <a href="/admin/users">Users</a>
        <form action="/admin/logout" method="POST" style="margin:0">
          <button type="submit" class="btn btn-sm btn-outline" style="color:#cbd5e1;border-color:#475569">Logout</button>
        </form>
      </div>
    </div>
  </nav>
  <main class="container" style="padding-top:1rem">
    {{if .Flash}}
    <div class="flash flash-{{.FlashType}}">{{.Flash}}</div>
    {{end}}
    {{template "content" .}}
  </main>
</body>
</html>{{end}}
