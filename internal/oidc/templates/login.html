<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン — rellf</title>
    <link rel="stylesheet" href="/oidc/static/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">rellf</h1>
            <p class="login-subtitle">アカウントにログイン</p>

            {{if .Error}}
            <div class="error-message">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/oidc/authorize">
                <input type="hidden" name="client_id" value="{{.ClientID}}">
                <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
                <input type="hidden" name="response_type" value="{{.ResponseType}}">
                <input type="hidden" name="scope" value="{{.Scope}}">
                <input type="hidden" name="state" value="{{.State}}">
                {{if .Nonce}}<input type="hidden" name="nonce" value="{{.Nonce}}">{{end}}
                {{if .CodeChallenge}}<input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">{{end}}
                {{if .CodeChallengeMethod}}<input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">{{end}}

                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required autofocus
                           placeholder="you@example.com" value="{{.Email}}">
                </div>

                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" name="password" required
                           placeholder="パスワードを入力">
                </div>

                <button type="submit" class="btn-login">ログイン</button>
            </form>
        </div>
    </div>
</body>
</html>
